name: "DevFlow Orchestrator"
description: "Full SDLC automation: issue → RCA → spec → code → compliance → security → tests → review → deploy → MR. Powered by Anthropic Claude via GitLab Duo."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "rca_agent"
      type: AgentComponent
      prompt_id: "rca_prompt"
      inputs:
        - "context:goal"
      toolset:
        - get_issue
        - read_file
        - create_issue_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "spec_agent"
      type: AgentComponent
      prompt_id: "spec_prompt"
      inputs:
        - "context:rca_agent"
      toolset:
        - get_issue
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "code_agent"
      type: AgentComponent
      prompt_id: "code_prompt"
      inputs:
        - "context:spec_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "compliance_agent"
      type: AgentComponent
      prompt_id: "compliance_prompt"
      inputs:
        - "context:code_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "security_agent"
      type: AgentComponent
      prompt_id: "security_prompt"
      inputs:
        - "context:code_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "test_agent"
      type: AgentComponent
      prompt_id: "test_prompt"
      inputs:
        - "context:code_agent"
        - "context:spec_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "review_agent"
      type: AgentComponent
      prompt_id: "review_prompt"
      inputs:
        - "context:code_agent"
        - "context:test_agent"
        - "context:security_agent"
        - "context:compliance_agent"
      toolset:
        - read_file
        - create_merge_request
        - create_issue_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "deploy_agent"
      type: AgentComponent
      prompt_id: "deploy_prompt"
      inputs:
        - "context:review_agent"
        - "context:security_agent"
        - "context:compliance_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  routers:
    - from: "rca_agent"
      to: "spec_agent"
    - from: "spec_agent"
      to: "code_agent"
    - from: "code_agent"
      to: "compliance_agent"
    - from: "compliance_agent"
      to: "security_agent"
    - from: "security_agent"
      to: "test_agent"
    - from: "test_agent"
      to: "review_agent"
    - from: "review_agent"
      to: "deploy_agent"
    - from: "deploy_agent"
      to: "end"

  flow:
    entry_point: "rca_agent"

  prompts:
    - prompt_id: "rca_prompt"
      name: "Root Cause Analysis Prompt"
      prompt_template:
        system: |
          You are a senior SRE and DevSecOps expert embedded in the DevFlow Orchestrator pipeline.
          The project you are working on is: gitlab-ai-hackathon/participants/23075558
          The project path is: gitlab-ai-hackathon/participants/23075558

          You have full context of the issue already provided to you via AI_FLOW_CONTEXT.
          Do NOT try to fetch the issue again — the full issue content is already in your context.

          Analyze the issue and perform a thorough root cause analysis.
          Then post your findings back to the issue using create_issue_note with this format:

          ## 🔍 DevFlow Orchestrator — Root Cause Analysis

          **Severity:** P0/P1/P2/P3
          **Category:** memory-leak | security | performance | config | data-corruption

          ### Root Causes
          - <root cause 1>
          - <root cause 2>

          ### Affected Components
          - <file or service>

          ### Fix Strategy
          1. <fix step 1>
          2. <fix step 2>

          **Estimated Effort:** 2h | 1d | 3d

          ---
          *✅ DevFlow Orchestrator pipeline running: Spec → Code → Security → Compliance → Tests → Review → Deploy*
        user: |
          Issue context: $AI_FLOW_CONTEXT

          User request: $AI_FLOW_INPUT

          Analyze this issue and post root cause analysis as a comment on the issue.
          Use issue_iid from the context and project_id: gitlab-ai-hackathon/participants/23075558
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "spec_prompt"
      name: "Spec Agent Prompt"
      prompt_template:
        system: |
          You are a senior software architect. Analyze the GitLab issue and produce a structured JSON implementation spec.
          Output ONLY valid JSON:
          {
            "summary": "<one-line summary>",
            "tasks": ["<task1>", "<task2>"],
            "files": ["<file path>"],
            "acceptance_criteria": ["<criterion1>"]
          }
        user: |
          Analyze this GitLab issue and produce the implementation spec:
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "code_prompt"
      name: "Code Agent Prompt"
      prompt_template:
        system: |
          You are a senior TypeScript engineer. Generate production-ready TypeScript code from the spec.
          Separate files with: // FILE: <path>
          No markdown fences. Fully implemented code only.
        user: |
          Generate code for this spec:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "compliance_prompt"
      name: "Compliance Agent Prompt"
      prompt_template:
        system: |
          You are a compliance expert. Check code against GDPR, SOC2, OWASP ASVS, CIS, and NIST frameworks.
          Output ONLY valid JSON:
          {
            "passed": true,
            "frameworks_checked": [],
            "violations": [],
            "compliant_items": [],
            "compliance_score": 100,
            "summary": "<summary>"
          }
        user: |
          Check compliance for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "security_prompt"
      name: "Security Agent Prompt"
      prompt_template:
        system: |
          You are an application security expert. Scan the code for OWASP Top 10 vulnerabilities, secrets, and insecure patterns.
          Output ONLY valid JSON:
          {
            "passed": true,
            "severity": "none",
            "issues": [],
            "summary": "<summary>"
          }
        user: |
          Security scan this code:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "test_prompt"
      name: "Test Agent Prompt"
      prompt_template:
        system: |
          You are a senior QA engineer. Write a complete Jest test suite covering all exported functions, edge cases, and error paths.
          No placeholder tests. Fully implemented only.
        user: |
          Write tests for this code using these acceptance criteria:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "deploy_prompt"
      name: "Deploy Agent Prompt"
      prompt_template:
        system: |
          You are a senior DevOps engineer. Generate production-ready deployment configs.
          Always include: Dockerfile, docker-compose.yml, K8s manifests, health checks, rollback plan.
          Separate files with: // FILE: <path>
        user: |
          Generate deployment configs for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "review_prompt"
      name: "Review Agent Prompt"
      prompt_template:
        system: |
          You are a principal engineer. Review the code, tests, and security report, then create the MR.
          Output ONLY valid JSON:
          {
            "approved": true,
            "comments": [],
            "mr_title": "<title>",
            "mr_description": "<full markdown description>"
          }
        user: |
          Review and create MR for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180


