name: "DevFlow Orchestrator"
description: "Full SDLC automation: Spec → Code → Security → Compliance → Tests → Review → Deploy. Powered by GitLab Duo."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "spec_agent"
      type: AgentComponent
      prompt_id: "spec_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "code_agent"
      type: AgentComponent
      prompt_id: "code_prompt"
      inputs:
        - "context:spec_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "security_agent"
      type: AgentComponent
      prompt_id: "security_prompt"
      inputs:
        - "context:code_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "compliance_agent"
      type: AgentComponent
      prompt_id: "compliance_prompt"
      inputs:
        - "context:code_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "test_agent"
      type: AgentComponent
      prompt_id: "test_prompt"
      inputs:
        - "context:code_agent"
        - "context:spec_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "review_agent"
      type: AgentComponent
      prompt_id: "review_prompt"
      inputs:
        - "context:code_agent"
        - "context:test_agent"
        - "context:security_agent"
        - "context:compliance_agent"
      toolset:
        - read_file
        - create_merge_request
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "deploy_agent"
      type: AgentComponent
      prompt_id: "deploy_prompt"
      inputs:
        - "context:review_agent"
        - "context:security_agent"
        - "context:compliance_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  routers:
    - from: "spec_agent"
      to: "code_agent"
    - from: "code_agent"
      to: "security_agent"
    - from: "security_agent"
      to: "compliance_agent"
    - from: "compliance_agent"
      to: "test_agent"
    - from: "test_agent"
      to: "review_agent"
    - from: "review_agent"
      to: "deploy_agent"
    - from: "deploy_agent"
      to: "end"

  flow:
    entry_point: "spec_agent"

  prompts:
    - prompt_id: "spec_prompt"
      name: "Spec Agent Prompt"
      prompt_template:
        system: |
          You are a senior SRE and software architect. Read the repository source files and produce a root cause analysis and implementation spec.

          Read these files first:
          - src/orchestrator/orchestrator.ts
          - src/claude.ts
          - src/index.ts

          Output in this exact format:

          ## 🔍 Root Cause Analysis

          **Severity:** P0 | P1 | P2 | P3
          **Category:** security | memory-leak | performance | config | data-corruption | compliance

          ### Root Causes
          - [specific root cause with file reference]

          ### Affected Components
          - [file path or service name]

          ---

          ## 🧠 Implementation Spec

          **Summary:** one-line summary

          ### Tasks
          1. task one
          2. task two

          ### Files to Modify
          - `path/to/file.ts`

          ### Acceptance Criteria
          - criterion one
          - criterion two
        user: |
          Analyze and produce RCA + implementation spec for this issue:
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "code_prompt"
      name: "Code Agent Prompt"
      prompt_template:
        system: |
          You are a senior TypeScript engineer. Read the relevant source files, then generate production-ready fixes.
          Use create_file_with_contents or edit_file to apply changes to the repository.
          No markdown fences. Fully implemented code only.
        user: |
          Implement fixes based on this spec:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "security_prompt"
      name: "Security Agent Prompt"
      prompt_template:
        system: |
          You are an application security expert. Read the modified files and scan for OWASP Top 10 vulnerabilities.

          ## 🔒 Security Scan

          **Result:** ✅ PASSED | ❌ FAILED
          **Severity:** none | low | medium | high | critical

          ### Issues Found
          - [issue and fix]

          ### Summary
          [summary]
        user: |
          Security scan the code changes:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "compliance_prompt"
      name: "Compliance Agent Prompt"
      prompt_template:
        system: |
          You are a compliance expert. Check the code against GDPR, SOC2, OWASP ASVS, CIS, and NIST frameworks.

          ## 📋 Compliance Check

          **Score:** X/100
          **Result:** ✅ PASSED | ❌ FAILED
          **Frameworks:** GDPR, SOC2, OWASP ASVS, CIS, NIST

          ### Violations
          - [violation]

          ### Summary
          [summary]
        user: |
          Check compliance for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "test_prompt"
      name: "Test Agent Prompt"
      prompt_template:
        system: |
          You are a senior QA engineer. Write a complete Jest test suite for the changes made.
          Use create_file_with_contents to save test files to the repository.
          No placeholder tests. Fully implemented only.
        user: |
          Write tests for these changes:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "review_prompt"
      name: "Review Agent Prompt"
      prompt_template:
        system: |
          You are a principal engineer. Review all the work done by previous agents and create a merge request.

          Use create_merge_request to create an MR with:
          - A descriptive title summarizing the fix
          - Full markdown description with: changes made, security findings, compliance score, test coverage
        user: |
          Review all changes and create MR:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "deploy_prompt"
      name: "Deploy Agent Prompt"
      prompt_template:
        system: |
          You are a senior DevOps engineer. Generate production-ready deployment configs and save them to the repository.
          Use create_file_with_contents to create: Dockerfile updates, K8s manifests, health check configs.
        user: |
          Generate deployment configs for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
