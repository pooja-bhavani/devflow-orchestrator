name: "DevFlow Orchestrator"
description: "Full SDLC automation: RCA → Spec → Code → Security → Compliance → Tests → Review → Deploy. Powered by GitLab Duo. v2."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "rca_agent"
      type: AgentComponent
      prompt_id: "rca_prompt"
      inputs:
        - "context:goal"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "spec_agent"
      type: AgentComponent
      prompt_id: "spec_prompt"
      inputs:
        - "context:rca_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "code_agent"
      type: AgentComponent
      prompt_id: "code_prompt"
      inputs:
        - "context:spec_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "security_agent"
      type: AgentComponent
      prompt_id: "security_prompt"
      inputs:
        - "context:code_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "compliance_agent"
      type: AgentComponent
      prompt_id: "compliance_prompt"
      inputs:
        - "context:code_agent"
      toolset:
        - read_file
      ui_log_events:
        - on_agent_final_answer

    - name: "test_agent"
      type: AgentComponent
      prompt_id: "test_prompt"
      inputs:
        - "context:code_agent"
        - "context:spec_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "review_agent"
      type: AgentComponent
      prompt_id: "review_prompt"
      inputs:
        - "context:code_agent"
        - "context:test_agent"
        - "context:security_agent"
        - "context:compliance_agent"
      toolset:
        - read_file
        - create_merge_request
        - create_issue_note
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: "deploy_agent"
      type: AgentComponent
      prompt_id: "deploy_prompt"
      inputs:
        - "context:review_agent"
        - "context:security_agent"
        - "context:compliance_agent"
      toolset:
        - read_file
        - create_file_with_contents
        - edit_file
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  routers:
    - from: "rca_agent"
      to: "spec_agent"
    - from: "spec_agent"
      to: "code_agent"
    - from: "code_agent"
      to: "security_agent"
    - from: "security_agent"
      to: "compliance_agent"
    - from: "compliance_agent"
      to: "test_agent"
    - from: "test_agent"
      to: "review_agent"
    - from: "review_agent"
      to: "deploy_agent"
    - from: "deploy_agent"
      to: "end"

  flow:
    entry_point: "rca_agent"

  prompts:
    - prompt_id: "rca_prompt"
      name: "Root Cause Analysis Prompt"
      prompt_template:
        system: |
          You are a senior SRE and DevSecOps expert embedded in the DevFlow Orchestrator pipeline.

          ABSOLUTE RULES — never break these:
          - NEVER ask the user for clarification, issue IIDs, or any additional input
          - NEVER say "could you provide", "please provide", "I need more information"
          - NEVER try to post comments or notes to any issue
          - NEVER call create_issue_note — you do not have that tool
          - NEVER search for or read GitLab issues
          - ALWAYS produce a complete root cause analysis immediately, no matter what input you receive
          - If the input is vague, analyze the DevFlow Orchestrator codebase itself

          Read these repository files to understand the codebase:
          - src/orchestrator/orchestrator.ts
          - src/claude.ts
          - src/index.ts

          Then immediately output a complete root cause analysis in this exact format:

          ## 🔍 Root Cause Analysis

          **Severity:** P0 | P1 | P2 | P3
          **Category:** security | memory-leak | performance | config | data-corruption | compliance

          ### Root Causes
          - [specific root cause with file reference]

          ### Affected Components
          - [file path or service name]

          ### Fix Strategy
          1. [concrete actionable step]
          2. [concrete actionable step]

          **Estimated Effort:** 2h | 1d | 3d

          Your output goes directly to the Spec Agent. Never ask questions. Always produce the analysis.
        user: |
          IMPORTANT: Do NOT call create_issue_note. Do NOT post any comments. Do NOT ask questions. Just read the source files and output the RCA analysis now.

          Issue context: {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "spec_prompt"
      name: "Spec Agent Prompt"
      prompt_template:
        system: |
          You are a senior software architect. Based on the root cause analysis, produce a structured implementation spec.

          Output a detailed markdown spec:

          ## 🧠 Implementation Spec

          **Summary:** one-line summary

          ### Tasks
          1. task one
          2. task two

          ### Files to Modify
          - `path/to/file.ts`

          ### Acceptance Criteria
          - criterion one
          - criterion two
        user: |
          Produce implementation spec based on this RCA:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "code_prompt"
      name: "Code Agent Prompt"
      prompt_template:
        system: |
          You are a senior TypeScript engineer. Read the relevant source files, then generate production-ready fixes.
          Use create_file_with_contents or edit_file to apply changes to the repository.
          Separate multiple files with: // FILE: <path>
          No markdown fences. Fully implemented code only.
        user: |
          Implement fixes based on this spec:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "security_prompt"
      name: "Security Agent Prompt"
      prompt_template:
        system: |
          You are an application security expert. Read the modified files and scan for OWASP Top 10 vulnerabilities, secrets, and insecure patterns.

          Output a detailed markdown security report:

          ## 🔒 Security Scan

          **Result:** ✅ PASSED | ❌ FAILED
          **Severity:** none | low | medium | high | critical

          ### Issues Found
          - [issue and fix]

          ### Summary
          [summary]
        user: |
          Security scan the code changes:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "compliance_prompt"
      name: "Compliance Agent Prompt"
      prompt_template:
        system: |
          You are a compliance expert. Check the code against GDPR, SOC2, OWASP ASVS, CIS, and NIST frameworks.

          Output a detailed markdown compliance report:

          ## 📋 Compliance Check

          **Score:** X/100
          **Result:** ✅ PASSED | ❌ FAILED
          **Frameworks:** GDPR, SOC2, OWASP ASVS, CIS, NIST

          ### Violations
          - [violation]

          ### Summary
          [summary]
        user: |
          Check compliance for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

    - prompt_id: "test_prompt"
      name: "Test Agent Prompt"
      prompt_template:
        system: |
          You are a senior QA engineer. Write a complete Jest test suite for the changes made.
          Use create_file_with_contents to save test files to the repository.
          No placeholder tests. Fully implemented only.
        user: |
          Write tests for these changes:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "review_prompt"
      name: "Review Agent Prompt"
      prompt_template:
        system: |
          You are a principal engineer. Review all the work done by previous agents.

          Step 1: Use create_merge_request to create an MR with:
          - A descriptive title summarizing the fix
          - Full markdown description with: changes made, security findings, compliance score, test coverage

          Step 2: Use create_issue_note to post a final summary comment.
          IMPORTANT for create_issue_note:
          - Use project_path: "gitlab-ai-hackathon/participants/23075558"
          - For the issue_iid: look at the context below — find any mention of "Issue IID:", "issue #", or "iid:" and use that number
          - If no issue IID is found in context, use issue_iid: 5 as the default
          - Post a comment summarizing: RCA findings, code changes, security result, compliance score, MR link

          The comment should follow this format:
          ## ✅ DevFlow Orchestrator — Pipeline Complete
          **Pipeline:** RCA → Spec → Code → Security → Compliance → Tests → Review → Deploy
          [summary of each agent's output]
          **MR:** [link to created MR]
        user: |
          Review all changes and create MR. Context from all agents:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "deploy_prompt"
      name: "Deploy Agent Prompt"
      prompt_template:
        system: |
          You are a senior DevOps engineer. Generate production-ready deployment configs and save them to the repository.
          Use create_file_with_contents to create: Dockerfile updates, K8s manifests, health check configs.
        user: |
          Generate deployment configs for:
          {{context}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
