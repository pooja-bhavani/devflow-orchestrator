stages:
  - test
  - pipeline
  - deploy

variables:
  NODE_VERSION: "20"

# ── Test ──────────────────────────────────────────────────────────────────────
validate-source:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npx tsc --noEmit
    - echo "✅ TypeScript typecheck passed"
    - |
      for f in \
        src/orchestrator/orchestrator.ts \
        src/gitlab/gitlabClient.ts \
        src/claude.ts \
        src/index.ts \
        src/agents/rootCauseAgent.ts \
        src/agents/specAgent.ts \
        src/agents/codeAgent.ts \
        src/agents/securityAgent.ts \
        src/agents/complianceAgent.ts \
        src/agents/testAgent.ts \
        src/agents/reviewAgent.ts \
        src/agents/deployAgent.ts; do
        if [ ! -f "$f" ]; then echo "❌ Missing: $f"; exit 1; fi
        echo "  ✅ $f"
      done
    - echo "✅ All 8 agents and core files present"

validate-flow:
  stage: test
  image: node:20-alpine
  script:
    - |
      node -e "
        const fs = require('fs');
        const c = fs.readFileSync('flows/devflow.yml','utf8');
        ['rca_agent','spec_agent','code_agent','security_agent',
         'compliance_agent','test_agent','review_agent','deploy_agent'].forEach(a=>{
          if(!c.includes(a)){console.error('Missing:',a);process.exit(1);}
          console.log('  ✅',a);
        });
        console.log('✅ Flow valid — 8 agents');
      "

# ── DevFlow Pipeline — run all 8 agents on issue #6 ──────────────────────────
run-pipeline:
  stage: pipeline
  image: node:20-alpine
  variables:
    ISSUE_IID: "6"
    ANTHROPIC_API_KEY: "REMOVED_SECRET"
    GITLAB_TOKEN: "glpat-DuSYGfrebh1DqZYyy5Q5eW86MQp1OmRxbDdxCw.01.120j7wput"
    GITLAB_PROJECT_ID: "79558990"
    GITLAB_API_URL: "https://gitlab.com/api/v4"
  script:
    - npm ci
    - echo "🚀 Running DevFlow pipeline on issue #${ISSUE_IID}..."
    - node scripts/run-pipeline.mjs ${ISSUE_IID}
  when: manual
  allow_failure: false

# ── DevFlow Pipeline — run on any issue ──────────────────────────────────────
run-pipeline-any-issue:
  stage: pipeline
  image: node:20-alpine
  variables:
    ANTHROPIC_API_KEY: "REMOVED_SECRET"
    GITLAB_TOKEN: "glpat-DuSYGfrebh1DqZYyy5Q5eW86MQp1OmRxbDdxCw.01.120j7wput"
    GITLAB_PROJECT_ID: "79558990"
    GITLAB_API_URL: "https://gitlab.com/api/v4"
  script:
    - npm ci
    - ISSUE=${ISSUE_IID:-6}
    - echo "� Running DevFlow pipeline on issue #${ISSUE}..."
    - node scripts/run-pipeline.mjs ${ISSUE}
  when: manual
  allow_failure: false

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy-staging:
  stage: deploy
  image: node:20-alpine
  environment:
    name: staging
  script:
    - echo "✅ Deploying to staging..."
  only:
    - main
  when: manual

deploy-production:
  stage: deploy
  image: node:20-alpine
  environment:
    name: production
  script:
    - echo "✅ Deploying to production..."
  only:
    - main
  when: manual
  needs:
    - deploy-staging
