stages:
  - test
  - pipeline
  - deploy

variables:
  NODE_VERSION: "20"

# ── Test: validate all source files and agents exist ─────────────────────────
validate-source:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npx tsc --noEmit
    - echo "✅ TypeScript typecheck passed"
    - |
      for f in \
        src/orchestrator/orchestrator.ts \
        src/gitlab/gitlabClient.ts \
        src/claude.ts \
        src/index.ts \
        src/agents/rootCauseAgent.ts \
        src/agents/specAgent.ts \
        src/agents/codeAgent.ts \
        src/agents/securityAgent.ts \
        src/agents/complianceAgent.ts \
        src/agents/testAgent.ts \
        src/agents/reviewAgent.ts \
        src/agents/deployAgent.ts; do
        if [ ! -f "$f" ]; then echo "❌ Missing: $f"; exit 1; fi
        echo "  ✅ $f"
      done
    - echo "✅ All 8 agents and core files present"
  allow_failure: false

validate-flow:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - |
      node -e "
        const fs = require('fs');
        const content = fs.readFileSync('flows/devflow.yml', 'utf8');
        const agents = ['rca_agent','spec_agent','code_agent','security_agent',
                        'compliance_agent','test_agent','review_agent','deploy_agent'];
        agents.forEach(a => {
          if (!content.includes(a)) { console.error('❌ Missing agent:', a); process.exit(1); }
          console.log('  ✅', a);
        });
        if (!content.includes('create_merge_request')) {
          console.error('❌ Missing create_merge_request'); process.exit(1);
        }
        console.log('✅ Flow valid — 8 agents, MR creation enabled');
      "
  allow_failure: false

# ── DevFlow Pipeline — run all 8 agents on issue #6 (manual) ─────────────────
run-pipeline:
  stage: pipeline
  image: node:20-alpine
  variables:
    ISSUE_IID: "6"
    ANTHROPIC_API_KEY: ""
    GITLAB_TOKEN: "glpat-DuSYGfrebh1DqZYyy5Q5eW86MQp1OmRxbDdxCw.01.120j7wput"
    GITLAB_PROJECT_ID: "79558990"
    GITLAB_API_URL: "https://gitlab.com/api/v4"
  script:
    - npm ci
    - npm run build
    - |
      echo "🚀 Starting DevFlow Orchestrator..."
      node dist/index.js &
      SERVER_PID=$!
      sleep 5
      echo "🔍 Running all 8 agents on issue #${ISSUE_IID}..."
      wget -q -O- --post-data='{}' \
        --header='Content-Type: application/json' \
        http://localhost:3000/trigger/${ISSUE_IID}
      echo "⏳ Waiting 180s for all agents to complete..."
      sleep 180
      kill $SERVER_PID || true
      echo "✅ Done — check issue #${ISSUE_IID} for agent comments and auto-created MR"
  when: manual
  allow_failure: false

# ── DevFlow Pipeline — run on any issue (set ISSUE_IID when triggering) ───────
run-pipeline-any-issue:
  stage: pipeline
  image: node:20-alpine
  variables:
    ANTHROPIC_API_KEY: ""
    GITLAB_TOKEN: "glpat-DuSYGfrebh1DqZYyy5Q5eW86MQp1OmRxbDdxCw.01.120j7wput"
    GITLAB_PROJECT_ID: "79558990"
    GITLAB_API_URL: "https://gitlab.com/api/v4"
  script:
    - npm ci
    - npm run build
    - |
      ISSUE=${ISSUE_IID:-6}
      echo "🚀 Starting DevFlow Orchestrator for issue #${ISSUE}..."
      node dist/index.js &
      SERVER_PID=$!
      sleep 5
      echo "🔍 Running all 8 agents on issue #${ISSUE}..."
      wget -q -O- --post-data='{}' \
        --header='Content-Type: application/json' \
        http://localhost:3000/trigger/${ISSUE}
      echo "⏳ Waiting 180s for all agents..."
      sleep 180
      kill $SERVER_PID || true
      echo "✅ Done — check issue #${ISSUE} for comments and auto-created MR"
  when: manual
  allow_failure: false

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy-staging:
  stage: deploy
  image: node:20-alpine
  environment:
    name: staging
    url: http://staging.devflow.example.com
  script:
    - echo "✅ Deploying DevFlow Orchestrator to staging..."
  only:
    - main
  when: manual

deploy-production:
  stage: deploy
  image: node:20-alpine
  environment:
    name: production
    url: http://devflow.example.com
  script:
    - echo "✅ Deploying DevFlow Orchestrator to production..."
  only:
    - main
  when: manual
  needs:
    - deploy-staging
